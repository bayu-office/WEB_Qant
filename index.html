<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-Ant Barber | Ultimate System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .glass { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(10px); }
        .dash-tab { display: none; }
        .dash-tab.active { display: block; }
        .numpad-btn { height: 70px; background: #1f2937; border-radius: 1rem; font-weight: 800; font-size: 1.5rem; transition: 0.2s; }
        .numpad-btn:active { background: #f59e0b; color: #111827; transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen">

    <script>
        // GANTI DENGAN URL APPS SCRIPT PADUKA
        const API_URL = "https://script.google.com/macros/s/AKfycbxB1g5DLvkzvJfp6KbDZ7eYPI08VRBcD0SlOuxwu2lFf_qwoBWv9yj9VEex4BJAul5B/exec";
        const CORRECT_PIN = "1234";
        let currentPin = "";
    </script>

    <div id="page-user" class="page active">
        <header class="p-6 text-center bg-gray-800 shadow-2xl rounded-b-[3rem] border-b-4 border-amber-500">
            <h1 class="text-3xl font-black tracking-widest text-amber-500 uppercase italic">Q-ANT BARBER</h1>
            <div class="flex justify-around mt-8 gap-4">
                <div class="glass p-4 rounded-2xl flex-1 border border-gray-600">
                    <p class="text-[10px] uppercase text-gray-400 font-bold mb-1">Sedang Diproses</p>
                    <p id="user-curr" class="text-2xl font-black text-amber-400">--</p>
                </div>
                <div class="glass p-4 rounded-2xl flex-1 border border-gray-600">
                    <p class="text-[10px] uppercase text-gray-400 font-bold mb-1">Total Antrean</p>
                    <p id="user-total" class="text-2xl font-black text-amber-400">--</p>
                </div>
            </div>
        </header>

        <main class="p-6 space-y-6 max-w-md mx-auto">
            <div class="grid grid-cols-2 gap-4 mt-4">
                <button onclick="openModal('antre')" class="bg-amber-500 text-gray-900 font-black p-5 rounded-3xl shadow-lg active:scale-95 transition-all">
                    <i class="fa-solid fa-bolt block mb-2 text-3xl"></i> AMBIL ANTREAN
                </button>
                <button onclick="openModal('booking')" class="bg-gray-800 border-2 border-amber-500 text-amber-500 font-black p-5 rounded-3xl shadow-lg active:scale-95 transition-all">
                    <i class="fa-solid fa-calendar-day block mb-2 text-3xl"></i> BOOKING
                </button>
            </div>

            <section class="bg-gray-800/50 p-6 rounded-3xl border border-gray-700 shadow-xl">
                <h2 class="text-[10px] font-bold uppercase mb-4 text-gray-400">Cek Status Saya</h2>
                <div class="flex gap-2">
                    <input id="cek-kode" type="text" placeholder="KODE (A-XXXX)" class="bg-gray-900 border border-gray-600 rounded-2xl px-5 py-4 flex-1 focus:outline-none focus:border-amber-500 uppercase font-bold text-white">
                    <button onclick="cekStatus()" class="bg-amber-500 text-gray-900 font-black px-6 rounded-2xl">CEK</button>
                </div>
                <div id="status-result" class="hidden mt-4 p-4 bg-gray-900 rounded-2xl border border-amber-500/30 text-center">
                    <p id="status-text" class="text-sm font-bold text-amber-400"></p>
                </div>
            </section>
        </main>

        <footer class="mt-10 p-10 text-center opacity-20">
            <button onclick="showPage('page-login')" class="text-xs uppercase tracking-widest">Akses Capster</button>
        </footer>
    </div>

    <div id="page-login" class="page p-6">
        <div class="max-w-xs mx-auto text-center pt-10">
            <h2 class="text-amber-500 font-black text-2xl mb-8 uppercase italic">INPUT PIN</h2>
            <div class="flex justify-center gap-4 mb-10">
                <div id="dot1" class="w-4 h-4 rounded-full border-2 border-amber-500"></div>
                <div id="dot2" class="w-4 h-4 rounded-full border-2 border-amber-500"></div>
                <div id="dot3" class="w-4 h-4 rounded-full border-2 border-amber-500"></div>
                <div id="dot4" class="w-4 h-4 rounded-full border-2 border-amber-500"></div>
            </div>
            <div class="grid grid-cols-3 gap-4">
                <script>for(let i=1; i<=9; i++) document.write(`<button onclick="pressPin('${i}')" class="numpad-btn">${i}</button>`);</script>
                <button onclick="clearPin()" class="text-red-500 font-bold">CLR</button>
                <button onclick="pressPin('0')" class="numpad-btn">0</button>
                <button onclick="showPage('page-user')" class="text-gray-500 font-bold text-xs">ESC</button>
            </div>
        </div>
    </div>

    <div id="page-dash" class="page p-6">
        <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-4">
            <h2 class="text-amber-500 font-black text-xl italic uppercase">Capster Dash</h2>
            <button onclick="showPage('page-user')" class="bg-red-500 text-[10px] font-bold px-3 py-1 rounded-lg">KELUAR</button>
        </div>
        
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button onclick="showTab('tab-antrean')" class="bg-gray-800 px-4 py-2 rounded-xl text-xs font-bold border-b-2 border-amber-500">Antrean</button>
            <button onclick="showTab('tab-pesan')" class="bg-gray-800 px-4 py-2 rounded-xl text-xs font-bold border-b-2 border-transparent">Pesan WA</button>
        </div>

        <div id="tab-antrean" class="dash-tab active space-y-4"></div>
        <div id="tab-pesan" class="dash-tab">
            <p class="text-xs text-gray-500 italic text-center py-10">Pengaturan pesan dilakukan di Google Sheets (Tab: PESAN_WA)</p>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-50 p-6 items-center justify-center">
        <div class="bg-gray-800 w-full max-w-sm rounded-[2.5rem] p-8 border-2 border-amber-500 relative">
            <button onclick="closeModal()" class="absolute -top-4 -right-2 bg-amber-500 text-gray-900 w-10 h-10 rounded-full font-black flex items-center justify-center">X</button>
            <h3 class="text-xl font-black text-amber-500 uppercase mb-8 text-center tracking-widest italic">FORMULIR</h3>
            <form id="form-order" class="space-y-5">
                <input type="hidden" id="form-type">
                <div><label class="text-[10px] font-bold text-gray-400 uppercase ml-2 block">Hari</label><select id="form-tgl" class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-5 py-4 font-bold text-white"></select></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase ml-2 block">Nama</label><input type="text" id="form-nama" required class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-5 py-4 font-bold"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase ml-2 block">WhatsApp</label><input type="number" id="form-nomor" required placeholder="08..." class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-5 py-4 font-bold"></div>
                <div id="booking-extra" class="hidden">
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-2 block">Pilih Jam</label>
                    <select id="form-jam" class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-5 py-4 font-bold text-white">
                        <option value="13:00">13:00</option><option value="14:00">14:00</option><option value="15:00">15:00</option>
                    </select>
                </div>
                <button type="submit" id="btn-submit" class="w-full bg-amber-500 text-gray-900 font-black py-5 rounded-2xl shadow-xl uppercase">Simpan Data</button>
            </form>
        </div>
    </div>

    <script>
        const getTgl = (off) => { const d = new Date(); d.setDate(d.getDate() + off); return d.toLocaleDateString('id-ID', {day:'2-digit', month:'2-digit', year:'numeric'}).replace(/\//g, '-'); };
        const getNamaHari = (off) => { const d = new Date(); d.setDate(d.getDate() + off); return d.toLocaleDateString('id-ID', {weekday: 'long', day:'numeric', month:'short'}); };

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const cekKode = urlParams.get('cek');
            if(cekKode) { document.getElementById('cek-kode').value = cekKode; cekStatus(); }
            fetchData();
        };

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(pageId === 'page-user') fetchData();
            if(pageId === 'page-dash') loadDash();
        }

        function showTab(tabId) {
            document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        function fetchData() {
            fetch(`${API_URL}?action=getJadwal&tanggal=${getTgl(0)}`)
            .then(r => r.json()).then(data => {
                const total = data.filter(d => ['Antre','Booking'].includes(d['Status Slot'])).length;
                const active = data.find(d => d['Status Slot'] === 'Diproses');
                document.getElementById('user-total').innerText = total;
                document.getElementById('user-curr').innerText = active ? active['Kode'] : '--';
            });
        }

        function cekStatus() {
            const kode = document.getElementById('cek-kode').value.toUpperCase();
            if(!kode) return;
            const resDiv = document.getElementById('status-result');
            const resText = document.getElementById('status-text');
            fetch(`${API_URL}?action=getJadwal&tanggal=${getTgl(0)}`)
            .then(r => r.json()).then(data => {
                const me = data.find(d => d['Kode'] === kode);
                if(!me) resText.innerText = "Kode tidak ditemukan.";
                else {
                    const idx = data.findIndex(d => d['Kode'] === kode);
                    const procIdx = data.findIndex(d => d['Status Slot'] === 'Diproses');
                    const antreDiDepan = procIdx === -1 ? idx : idx - procIdx;
                    resText.innerText = `Status: ${me['Status Slot']}. Sisa Antrean: ${antreDiDepan} orang.`;
                }
                resDiv.classList.remove('hidden');
            });
        }

        function openModal(type) {
            document.getElementById('form-type').value = type;
            document.getElementById('modal').style.display = 'flex';
            const selTgl = document.getElementById('form-tgl');
            selTgl.innerHTML = type === 'antre' ? `<option value="${getTgl(0)}">${getNamaHari(0)}</option>` : `<option value="${getTgl(1)}">${getNamaHari(1)}</option>`;
            document.getElementById('booking-extra').classList.toggle('hidden', type === 'antre');
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        document.getElementById('form-order').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.innerText = "PROSES..."; btn.disabled = true;
            const baseUrl = window.location.href.split('?')[0]; 
            const payload = {
                action: "submitBooking",
                type: document.getElementById('form-type').value,
                nama: document.getElementById('form-nama').value,
                nomor: document.getElementById('form-nomor').value,
                jam: document.getElementById('form-jam').value,
                tanggal: document.getElementById('form-tgl').value,
                baseUrl: baseUrl
            };
            fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(r => r.json()).then(res => { alert(`BERHASIL! Kode: ${res.kode}`); location.reload(); });
        };

        function pressPin(num) {
            if(currentPin.length < 4) { currentPin += num; document.getElementById(`dot${currentPin.length}`).classList.add('bg-amber-500'); }
            if(currentPin.length === 4) { if(currentPin === CORRECT_PIN) showPage('page-dash'); else { alert("SALAH!"); clearPin(); } }
        }
        function clearPin() { currentPin = ""; for(let i=1; i<=4; i++) document.getElementById(`dot${i}`).classList.remove('bg-amber-500'); }

        function loadDash() {
            fetch(`${API_URL}?action=getJadwal&tanggal=${getTgl(0)}`)
            .then(r => r.json()).then(data => {
                const list = document.getElementById('tab-antrean');
                const filter = data.filter(d => d['Status Slot'] !== 'Available');
                list.innerHTML = filter.map((d, i) => `
                    <div class="bg-gray-800 p-5 rounded-3xl border border-gray-700 flex justify-between items-center shadow-lg">
                        <div class="flex-1">
                            <span class="text-[9px] uppercase font-black px-2 py-0.5 rounded-full bg-gray-900 ${d['Status Slot'] === 'Selesai' ? 'text-green-500' : 'text-amber-500'}">${d['Status Slot']}</span>
                            <p class="text-xl font-black mt-1">${d['Kode']} - ${d['Nama'] || '---'}</p>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">${d['Jam']} | WA: ${d['Nomor'] || '-'}</p>
                        </div>
                        <div class="flex gap-2">
                            ${(d['Status Slot'] === 'Antre' || d['Status Slot'] === 'Booking') ? `<button onclick="actionCapster('panggil', '${d['Nomor']}', '${d['Nama']}', ${i+2})" class="bg-amber-500 text-gray-900 w-12 h-12 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-microphone"></i></button>` : ''}
                            ${d['Status Slot'] === 'Diproses' ? `<button onclick="actionCapster('selesai', '${d['Nomor']}', '${d['Nama']}', ${i+2})" class="bg-green-500 text-white w-12 h-12 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-check"></i></button>` : ''}
                        </div>
                    </div>
                `).join('') || '<p class="text-center text-gray-500 py-10">Antrean Kosong</p>';
            });
        }

        function actionCapster(act, wa, nama, row) {
            let total = "-"; let layanan = "-";
            if(act === 'selesai') { 
                layanan = prompt("Rincian Layanan (misal: Cukur + Semir):", "Cukur");
                if(!layanan) return;
                total = prompt("Total Bayar (Rp):", "35000"); 
                if(!total) return; 
            }
            const payload = { action: act, nomor: wa, nama: nama, row: row, pin: CORRECT_PIN, tanggal: getTgl(0), totalHarga: total, layananPaten: layanan, layananOpsional: "-" };
            fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }).then(() => loadDash());
        }
    </script>
</body>
</html>
